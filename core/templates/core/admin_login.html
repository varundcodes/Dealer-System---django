<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .login-box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:320px;
            box-shadow:0 8px 20px rgba(0,0,0,0.25);
        }
        h2{
            text-align:center;
            margin-bottom:20px;
        }
        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            font-size:16px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
        .msg{
            color:red;
            text-align:center;
            margin-bottom:10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Enter username" required>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>

         <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
</div>
</body>
</html>
