<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    

    <style>    
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1d4ed8, #7c3aed);
            padding-top: 100px;
        }

        .box {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #1d4ed8;
            color: white;
            border: none;
            font-weight: bold;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
