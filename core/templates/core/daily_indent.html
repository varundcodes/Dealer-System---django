<!DOCTYPE html>
<html>
<head>
    <title>Daily Indent</title>
    <style>
        body{font-family:Arial; background:#f1f5f9;}
        .container{width:95%; margin:20px auto;}
        table{width:100%; border-collapse:collapse; background:white;}
        th, td{border:1px solid #ccc; padding:8px; text-align:center;}
        th{background:#2563eb; color:white;}
        input{width:60px;}
    </style>
</head>
<body>

<div class="container">

<h2>Daily Indent</h2>

<form method="POST">
    {% csrf_token %}

    Date: <input type="date" name="date" value="{{ selected_date }}" required>

    <br><br>

    <table>
        <tr>
            <th>Vendor</th>
            <th>Cash</th>

            {% for paper in newspapers %}
                <th>{{ paper.name }}</th>
            {% endfor %}
        </tr>

        {% for vendor in vendors %}
        <tr>
            <td>{{ vendor.name }}</td>

            <td>
                <input type="number" name="cash_{{ vendor.id }}" value="0">
            </td>

            {% for paper in newspapers %}
            <td>
                <input type="number"
                       name="qty_{{ vendor.id }}_paper_{{ paper.id }}"
                       value="0">
            </td>
            {% endfor %}
        </tr>
        {% endfor %}

    </table>

    <br>
    <button type="submit">Save Indent</button>

</form>

</div>

</body>
</html>
