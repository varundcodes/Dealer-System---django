<!DOCTYPE html>
<html>
<head>
    <title>Daily Indent</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
        }
        .container{
            width: 95%;
            margin: 20px auto;
        }
        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td{
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
        th{
            background: #2563eb;
            color: white;
        }
        input{
            width: 70px;
            padding: 5px;
            text-align: center;
        }
        .date-input{
            width: 160px;
        }
        .save-btn{
            margin-top: 15px;
            padding: 12px 22px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .ledger-btn{
            display: inline-block;
            margin-top: 15px;
            margin-left: 10px;
            padding: 12px 22px;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Daily Indent</h2>

    <form method="POST" action="{% url 'daily_indent' %}" autocomplete="off">
        {% csrf_token %}

        <div>
            Date:
            <input class="date-input" type="date" name="date" value="{{ selected_date }}" required>
        </div>

        <br>

        <table>
            <tr>
                <th>Vendor</th>
                <th>Cash</th>
                <th>Udayavani</th>
                <th>Eenadu</th>
                <th>Dinakaran</th>
                <th>Sakshi</th>
                <th>K Prabha</th>
                <th>Business Standard</th>
                <th>Taranga</th>
                <th>Roopathara</th>
                <th>Tushara</th>
                <th>Return</th>
            </tr>

            {% for vendor in vendors %}
            <tr>
                <td>{{ vendor.name }}</td>

                <td><input type="number" step="0.01" min="0" name="cash_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="qty_udayavani_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="qty_eenadu_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="qty_dinakaran_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="qty_sakshi_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="qty_kprabha_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="qty_bstandard_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="mag_taranga_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="mag_roopathara_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="mag_tushara_{{ vendor.id }}" value="0"></td>
                <td><input type="number" min="0" name="return_{{ vendor.id }}" value="0"></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="12">No active vendors found.</td>
            </tr>
            {% endfor %}
        </table>

        <button type="submit" class="save-btn">Save Indent</button>
        <a class="ledger-btn" href="{% url 'executive_ledger_page' %}">View Ledger</a>

    </form>

</div>

</body>
</html>
