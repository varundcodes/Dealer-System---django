<!DOCTYPE html>
<html>
<head>
    <title>THULASI DISTRIBUTORS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
        }

        .header {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            margin-bottom: 15px;
            color: #0f172a;
        }

        .card p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
        }

        .btn:hover {
            background: linear-gradient(90deg, #1d4ed8, #1e40af);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="header">
    THULASI DISTRIBUTORS
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h2>Quick Login</h2>
            <p>Unified login for all user types</p>
            <a href="{% url 'login' %}" class="btn">Login</a>
        </div>

        <div class="card">
            <h2>Executive</h2>
            <a href="{% url 'executive_login' %}" class="btn">Login</a>
        </div>

        <div class="card">
            <h2>Vendor</h2>
            <a href="{% url 'vendor_login' %}" class="btn">Login</a>
        </div>

        <div class="card">
            <h2>Admin Panel</h2>
            <a href="{% url 'admin_login' %}" class="btn">Open</a>
        </div>

    </div>

    <div class="footer">
        © 2026 THULASI DISTRIBUTORS | Built with Django 🚀
    </div>

</div>

</body>
</html>
