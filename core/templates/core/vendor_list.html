<!DOCTYPE html>
<html>
<head>
    <title>Vendor List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0f172a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #2563eb;
            color: white;
        }
        .btn {
            background: #16a34a;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 8px;
        }
        .btn:hover {
            background: #15803d;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Vendor List</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Area</th>
            <th>Phone</th>
            <th>Ledger</th>
        </tr>
        {% for vendor in vendors %}
        <tr>
            <td>{{ vendor.name }}</td>
            <td>{{ vendor.area }}</td>
            <td>{{ vendor.phone }}</td>
            <td>
                <a href="{% url 'vendor_ledger' vendor.id %}" class="btn">Open Ledger</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No vendors found.</td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
