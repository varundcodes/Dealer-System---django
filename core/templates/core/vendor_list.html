<!DOCTYPE html>
<html>
<head>
    <title>Vendor List</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .header{
            background:#1e293b;
            padding:18px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }

        .container{
            width:95%;
            max-width:1100px;
            margin:30px auto;
        }

        .box{
            background:#1e293b;
            padding:25px;
            border-radius:14px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            gap:10px;
            flex-wrap:wrap;
        }

        .back-btn{
            display:inline-block;
            padding:10px 18px;
            background:#475569;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }

        select, button{
            padding:10px;
            border:none;
            border-radius:8px;
        }

        button{
            background:#2563eb;
            color:white;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            color:black;
        }

        th, td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#e2e8f0;
        }

        .view-btn{
            display:inline-block;
            padding:8px 14px;
            background:#16a34a;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }

        .active{
            color:green;
            font-weight:bold;
        }

        .inactive{
            color:red;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="header">Vendor List</div>

<div class="container">
    <div class="box">

        <div class="topbar">
            <a href="{% url 'admin_dashboard' %}" class="back-btn">Back</a>

            <form method="GET">
                <select name="area">
                    <option value="">Select Area</option>
                    {% for area in areas %}
                        <option value="{{ area.id }}" {% if selected_area == area.id|stringformat:"s" %}selected{% endif %}>
                            {{ area.name }}
                        </option>
                    {% endfor %}
                </select>

                <button type="submit">Load</button>
            </form>
        </div>

        <table>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Area</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            {% for vendor in vendors %}
            <tr>
                <td>{{ vendor.name }}</td>
                <td>{{ vendor.phone }}</td>
                <td>{{ vendor.area.name }}</td>
                <td>
                    {% if vendor.is_active %}
                        <span class="active">Active</span>
                    {% else %}
                        <span class="inactive">Inactive</span>
                    {% endif %}
                </td>
                <td>
                    <a href="{% url 'vendor_detail' vendor.id %}" class="view-btn">View</a>

                  <h3>Grand Total: ₹ {{ grand_total }}</h3>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No vendors found.</td>
            </tr>
            {% endfor %}
        </table>

    </div>
</div>

</body>
</html>
