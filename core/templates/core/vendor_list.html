<!DOCTYPE html>
<html>
<head>
    <title>Vendor List</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .filter-box {
            background: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        select, button {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #333;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #333;
            color: #fff;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .view-btn {
            background: #007bff;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 5px;
        }

        .message-row {
            font-weight: bold;
            color: #666;
        }
    </style>
</head>
<body>

<h2>Vendor List</h2>

<!-- ✅ AREA FILTER -->
<div class="filter-box">
    <form method="get">
        <label><strong>Select Area:</strong></label>

        <select name="area">
            <option value="">-- Select Area --</option>
            {% for area in areas %}
                <option value="{{ area.id }}"
                {% if selected_area == area.id|stringformat:"s" %}selected{% endif %}>
                    {{ area.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Search</button>
    </form>
</div>

<!-- ✅ TABLE -->
<table>
    <thead>
        <tr>
            <th>Vendor Name</th>
            <th>Area</th>
            <th>View</th>
        </tr>
    </thead>

    <tbody>
        {% if selected_area %}
            {% for vendor in vendors %}
            <tr>
                <td>{{ vendor.name }}</td>
                <td>{{ vendor.area.name }}</td>
                <td>
                    <a class="view-btn" href="{% url 'vendor_detail' vendor.id %}">
                        View
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr class="message-row">
                <td colspan="3">No vendors found in this area</td>
            </tr>
            {% endfor %}
        {% else %}
            <tr class="message-row">
                <td colspan="3">Please select an area to view vendors</td>
            </tr>
        {% endif %}
    </tbody>
</table>

</body>
</html>
