<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .header{
            background:#1e293b;
            padding:22px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:95%;
            margin:40px auto;
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:25px;
        }

        .card{
            background:#1e293b;
            padding:35px 20px;
            border-radius:16px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.25);
        }

        .card h2{
            margin-bottom:25px;
            font-size:22px;
        }

        .card a{
            text-decoration:none;
        }

        .card button{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .card button:hover{
            background:#1d4ed8;
        }

        .logout{
            text-align:center;
            margin-bottom:30px;
        }

        .logout a{
            color:white;
            background:#dc2626;
            padding:12px 25px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="header">Dealer System - Admin Dashboard</div>

<div class="container">

    <div class="card">
        <h2>Add Area</h2>
        <a href="{% url 'add_area' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Area Newspaper</h2>
        <a href="{% url 'map_area_newspaper' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Area Magazine</h2>
        <a href="{% url 'map_area_magazine' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Executive Vendor</h2>
        <a href="{% url 'map_executive_vendor' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Add Vendor</h2>
        <a href="{% url 'add_vendor' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Add Executive</h2>
        <a href="{% url 'add_executive' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Add Newspaper</h2>
        <a href="{% url 'add_newspaper' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Add Magazine</h2>
        <a href="{% url 'add_magazine' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Indent</h2>
        <a href="{% url 'admin_indent' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Payment History</h2>
        <a href="{% url 'payment_history' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Vendor List</h2>
        <a href="{% url 'vendor_list' %}"><button>Open</button></a>
    </div>

    <div class="card">
        <h2>Executive Page</h2>
        <a href="{% url 'executive_ledger_page' %}"><button>Open</button></a>
    </div>

</div>

<div class="logout">
    <a href="{% url 'admin_logout' %}">Logout</a>
</div>

</body>
</html>
