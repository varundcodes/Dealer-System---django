<!DOCTYPE html>
<html>
<head>
    <title>Dealer System Admin</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .header{
            background:#1e293b;
            padding:22px;
            text-align:center;
            font-size:30px;
            font-weight:bold;
            letter-spacing:1px;
        }

        .container{
            width:95%;
            max-width:1400px;
            margin:35px auto;
        }

        .section-title{
            margin-bottom:18px;
            margin-top:35px;
            font-size:24px;
            color:#93c5fd;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
            gap:22px;
        }

        .card{
            background:#1e293b;
            padding:28px 20px;
            border-radius:16px;
            text-align:center;
            box-shadow:0 6px 18px rgba(0,0,0,0.25);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h3{
            margin-bottom:18px;
            font-size:22px;
        }

        .card a{
            text-decoration:none;
        }

        .card button{
            background:#2563eb;
            color:white;
            border:none;
            padding:11px 20px;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
            font-weight:bold;
        }

        .card button:hover{
            background:#1d4ed8;
        }

        .logout-box{
            text-align:center;
            margin:40px 0;
        }

        .logout-btn{
            background:#dc2626;
            color:white;
            padding:12px 22px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
        }

        .logout-btn:hover{
            background:#b91c1c;
        }

    </style>
</head>

<body>

<div class="header">
    Dealer System - Admin Dashboard
</div>

<div class="container">

    <!-- MASTER -->
    <div class="section-title">Master Setup</div>

    <div class="grid">

        <div class="card">
            <h3>Add Area</h3>
            <a href="{% url 'add_area' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Add Newspaper</h3>
            <a href="{% url 'add_newspaper' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Add Magazine</h3>
            <a href="{% url 'add_magazine' %}">
                <button>Open</button>
            </a>
        </div>

    </div>

    <!-- STAFF -->
    <div class="section-title">Staff Management</div>

    <div class="grid">

        <div class="card">
            <h3>Add Vendor</h3>
            <a href="{% url 'add_vendor' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Add Executive</h3>
            <a href="{% url 'add_executive' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Vendor List</h3>
            <a href="{% url 'vendor_list' %}">
                <button>Open</button>
            </a>
        </div>

    </div>

    <!-- MAPPING -->
    <div class="section-title">Mappings</div>

    <div class="grid">

        <div class="card">
            <h3>Area Newspaper</h3>
            <a href="{% url 'map_area_newspaper' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Area Magazine</h3>
            <a href="{% url 'map_area_magazine' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Executive Vendor</h3>
            <a href="{% url 'map_executive_vendor' %}">
                <button>Open</button>
            </a>
        </div>

    </div>

    <!-- OPERATIONS -->
    <div class="section-title">Operations</div>

    <div class="grid">

        <div class="card">
            <h3>Admin Indent</h3>
            <a href="{% url 'admin_indent' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Payment History</h3>
            <a href="{% url 'payment_history' %}">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h3>Executive Ledger</h3>
            <a href="{% url 'executive_ledger_page' %}">
                <button>Open</button>
            </a>
        </div>

    </div>

    <div class="logout-box">
        <a href="{% url 'admin_logout' %}" class="logout-btn">
            Logout
        </a>
    </div>

</div>

</body>
</html>
