<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .header{
            background:#1e293b;
            padding:18px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:40px 20px;
        }

        .card{
            background:#1e293b;
            width:220px;
            padding:25px;
            border-radius:14px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.25);
        }

        .card h3{
            margin-bottom:15px;
        }

        .card a{
            display:inline-block;
            margin-top:10px;
            text-decoration:none;
            color:white;
            background:#2563eb;
            padding:10px 16px;
            border-radius:8px;
        }

        .card a:hover{
            background:#1d4ed8;
        }

        .logout{
            text-align:center;
            margin-bottom:30px;
        }

        .logout a{
            text-decoration:none;
            color:white;
            background:#dc2626;
            padding:10px 18px;
            border-radius:8px;
        }

        .logout a:hover{
            background:#b91c1c;
        }
    </style>
</head>
<body>

    <div class="header">Dealer System - Admin Dashboard</div>

    <div class="container">
        <div class="card">
            <h3>Add Area</h3>
            <a href="{% url 'add_area' %}">Open</a>
        </div>

        <div class="card">
            <h3>Area Newspaper</h3>
            <a href="{% url 'map_area_newspaper' %}">Open</a>
        </div>

        <div class="card">
            <h3>Add Vendor</h3>
            <a href="{% url 'add_vendor' %}">Open</a>
        </div>

        <div class="card">
            <h3>Add Executive</h3>
            <a href="{% url 'add_executive' %}">Open</a>
        </div>

        <div class="card">
            <h3>Add Newspaper</h3>
            <a href="{% url 'add_newspaper' %}">Open</a>
        </div>

        <div class="card">
            <h3>Add Magazine</h3>
            <a href="{% url 'add_magazine' %}">Open</a>
        </div>

        <div class="card">
            <h3>Indent</h3>
            <a href="{% url 'admin_indent' %}">Open</a>
        </div>

        <div class="card">
            <h3>Payment History</h3>
            <a href="{% url 'payment_history' %}">Open</a>
        </div>

        <div class="card">
            <h3>Vendor Page</h3>
            <a href="{% url 'vendor_login' %}">Open</a>
        </div>

        <div class="card">
            <h3>Executive Page</h3>
            <a href="{% url 'executive_login' %}">Open</a>
        </div>
    </div>

    <div class="logout">
        <a href="{% url 'admin_logout' %}">Logout</a>
    </div>

</body>
</html>
