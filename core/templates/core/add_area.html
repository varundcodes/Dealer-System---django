<!DOCTYPE html>
<html>
<head>
    <title>Add Area</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }
        .header{
            background:#1e293b;
            padding:18px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }
        .container{
            width:90%;
            max-width:800px;
            margin:30px auto;
        }
        .box{
            background:#1e293b;
            padding:25px;
            border-radius:14px;
            margin-bottom:25px;
        }
        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            margin:12px 0;
            box-sizing:border-box;
        }
        button, .back-btn{
            display:inline-block;
            padding:10px 18px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            cursor:pointer;
        }
        .back-btn{
            background:#475569;
            margin-left:10px;
        }
        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
            background:white;
            color:black;
        }
        th, td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }
        .msg{
            margin-bottom:10px;
        }
    </style>
</head>
<body>

    <div class="header">Add Area</div>

    <div class="container">
        <div class="box">
            {% if messages %}
                {% for message in messages %}
                    <div class="msg">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <label>Area Name</label>
                <input type="text" name="name" placeholder="Enter area name" required>

                <button type="submit">Save Area</button>
                <a href="{% url 'admin_dashboard' %}" class="back-btn">Back</a>
            </form>
        </div>

        <div class="box">
            <h3>Area List</h3>
            <table>
                <tr>
                    <th>ID</th>
                    <th>Area Name</th>
                </tr>
                {% for area in areas %}
                <tr>
                    <td>{{ area.id }}</td>
                    <td>{{ area.name }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">No areas added yet.</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>

</body>
</html>
