<!DOCTYPE html>
<html>
<head>
    <title>Add Area</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .header{
            background:#1e293b;
            padding:20px;
            text-align:center;
            font-size:26px;
            font-weight:bold;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:30px auto;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:14px;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            padding:12px 20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            color:black;
        }

        th, td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#e2e8f0;
        }

        .delete-btn{
            background:#dc2626;
            color:white;
            padding:7px 12px;
            border-radius:6px;
            text-decoration:none;
            font-weight:bold;
        }

        .delete-btn:hover{
            background:#b91c1c;
        }

        .back-btn{
            display:inline-block;
            margin-top:15px;
            background:#334155;
            color:white;
            padding:10px 16px;
            border-radius:8px;
            text-decoration:none;
        }

        .back-btn:hover{
            background:#475569;
        }

        .msg{
            background:#dcfce7;
            color:#166534;
            padding:10px;
            border-radius:8px;
            margin-bottom:12px;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="header">Add Area</div>

<div class="container">

    <div class="card">

        {% if messages %}
            {% for message in messages %}
                <div class="msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text"
                   name="name"
                   placeholder="Area Name"
                   required>

            <button type="submit">Save Area</button>

            <a href="{% url 'admin_dashboard' %}" class="back-btn">
                ⬅ Back
            </a>

        </form>

    </div>

    <div class="card">

        <h2>Area List</h2>

        <table>

            <tr>
                <th>Area Name</th>
                <th>Action</th>
            </tr>

            {% for area in areas %}

            <tr>

                <td>{{ area.name }}</td>

                <td>

                    <a href="{% url 'delete_area' area.id %}"
                       onclick="return confirm('Delete this area?')"
                       class="delete-btn">
                        Delete
                    </a>

                </td>

            </tr>

            {% empty %}

            <tr>
                <td colspan="2">No areas added yet.</td>
            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
