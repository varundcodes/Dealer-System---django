<!DOCTYPE html>
<html>
<head>
    <title>Vendor Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
        }
        .header {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            max-width: 500px;
            margin: 25px auto;
            padding: 15px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .name {
            font-size: 20px;
            font-weight: bold;
            color: #0f172a;
        }
        .info {
            color: #475569;
            margin-top: 5px;
        }
        .balance {
            margin-top: 15px;
            font-size: 26px;
            font-weight: bold;
            color: #16a34a;
        }
        .btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-top: 12px;
            padding: 12px;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
        }
        .logout {
            background: #ef4444;
        }
    </style>
</head>
<body>
<div class="header">
    📰 NewsHub System
</div>

<div class="container">
    {% if messages %}
        {% for message in messages %}
            <p style="color: green; text-align:center;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <div class="card">
        <div class="name">{{ vendor.name }}</div>
        <div class="info">{{ vendor.area.name }}</div>
        <div class="info">📞 {{ vendor.phone }}</div>
        <div class="balance">Balance: ₹{{ balance }}</div>
    </div>

    <a href="/vendor-ledger/" class="btn">📊 View Ledger</a>
    <a href="/make-payment/" class="btn">💰 Make Payment</a>
    <a href="/vendor-logout/" class="btn logout">🚪 Logout</a>
</div>
</body>
</html>
