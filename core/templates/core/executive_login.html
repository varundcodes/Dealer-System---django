<!DOCTYPE html>
<html>
<head>
    <title>Executive Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 20px;
        }
        .login-box {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #334155;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
        .error-box {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="header">
    📰 NewsHub System
</div>

<div class="container">
    <div class="login-box">
        <div class="title">Executive Login</div>
        <div class="subtitle">Login with phone number and password</div>

        {% if messages %}
            {% for message in messages %}
                <div class="error-box">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter phone number" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <button type="submit" class="btn">Login</button>
        </form>

        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
</div>
</body>
</html>
