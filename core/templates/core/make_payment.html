<!DOCTYPE html>
<html>
<head>
    <title>Make Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
        }
        .header {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            max-width: 500px;
            margin: 25px auto;
            padding: 15px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .info {
            text-align: center;
            color: #475569;
        }
        .balance {
            text-align: center;
            font-size: 22px;
            color: #16a34a;
            font-weight: bold;
            margin: 15px 0;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
        }
        textarea {
            resize: none;
            height: 60px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .back {
            display: block;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
        .upi {
            text-align: center;
            margin: 10px 0;
            color: #0f172a;
        }
    </style>
</head>
<body>
<div class="header">
    📰 NewsHub System
</div>

<div class="container">
    <div class="card">
        {% if messages %}
            {% for message in messages %}
                <p style="color: green; text-align:center;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <div class="title">Welcome {{ vendor.name }}</div>
        <div class="info">{{ vendor.area.name }}</div>
        <div class="info">{{ vendor.phone }}</div>

        <div class="balance">Balance: ₹{{ balance }}</div>

        <div class="upi">UPI: {{ upi_id }}</div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <label>Date</label>
            <input type="date" name="date" required>

            <label>Amount</label>
            <input type="number" name="amount" required>

            <label>Upload Screenshot</label>
            <input type="file" name="screenshot">

            <label>Note (UPI / Cash)</label>
            <textarea name="note"></textarea>

            <button type="submit" class="btn">Save Payment</button>
        </form>

        <a href="/vendor-dashboard/" class="back">← Back to Dashboard</a>
    </div>
</div>
</body>
</html>
