<!DOCTYPE html>
<html>
<head>
    <title>Vendor Details</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }
        .header{
            background:#1e293b;
            padding:18px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }
        .container{
            width:90%;
            max-width:800px;
            margin:30px auto;
        }
        .back-btn{
            display:inline-block;
            margin-bottom:20px;
            padding:10px 18px;
            background:#475569;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }
        .card{
            background:#1e293b;
            padding:25px;
            border-radius:14px;
        }
        .row{
            background:#334155;
            padding:14px;
            border-radius:10px;
            margin-bottom:12px;
        }
    </style>
</head>
<body>

<div class="header">Vendor Details</div>

<div class="container">
    <a href="{% url 'vendor_list' %}" class="back-btn">Back</a>

    <div class="card">
        <div class="row"><strong>Name:</strong> {{ vendor.name }}</div>
        <div class="row"><strong>Phone:</strong> {{ vendor.phone }}</div>
        <div class="row"><strong>Area:</strong> {{ vendor.area.name }}</div>
        <div class="row"><strong>Status:</strong> {% if vendor.is_active %}Active{% else %}Inactive{% endif %}</div>
    </div>
</div>

</body>
</html>
