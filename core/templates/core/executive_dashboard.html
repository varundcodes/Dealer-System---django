<!DOCTYPE html>
<html>
<head>
    <title>Executive Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
        }
        .btn {
            display: inline-block;
            padding: 12px 18px;
            margin-right: 10px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .btn.logout {
            background: #dc2626;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Welcome {{ executive.name }}</h2>
    <p><strong>Phone:</strong> {{ executive.phone }}</p>
    <p><strong>Area:</strong> {{ executive.area.name }}</p>

    <a href="/daily-indent/" class="btn">Add Daily Indent</a>
    <a href="/executive-logout/" class="btn logout">Logout</a>
</div>
</body>
</html>
